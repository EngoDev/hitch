name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: hitch-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            asset_name: hitch-${{ github.ref_name }}-aarch64-unknown-linux-gnu

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release asset
        run: |
          cp target/${{ matrix.target }}/release/hitch ${{ matrix.asset_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify release assets
        run: |
          ls -la dist
          test -f dist/hitch-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          test -f dist/hitch-${{ github.ref_name }}-aarch64-unknown-linux-gnu

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hitch-${{ github.ref_name }}-x86_64-unknown-linux-gnu
            dist/hitch-${{ github.ref_name }}-aarch64-unknown-linux-gnu
